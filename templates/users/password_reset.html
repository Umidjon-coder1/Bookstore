{% extends 'base.html' %}
{% block title %}Parolni tiklash — Muxtor kitob do'koni{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-5">
          <h4 class="fw-bold mb-2"><i class="fas fa-lock-open text-primary me-2"></i>Parolni tiklash</h4>
          <p class="text-muted small mb-4">Tiklash ko'rsatmalarini olish uchun elektron pochtangizni kiriting.</p>
          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Elektron pochta</label>
              {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Tiklash xatini yuborish</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'users:login' %}" class="text-muted small">Kirishga qaytish</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
