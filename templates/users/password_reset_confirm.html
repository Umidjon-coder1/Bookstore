{% extends 'base.html' %}
{% block title %}Set New Password - Bookstore{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-5">
          <h4 class="fw-bold mb-4"><i class="fas fa-key text-primary me-2"></i>Set New Password</h4>
          <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Set Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
